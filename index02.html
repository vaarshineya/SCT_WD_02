<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — Split Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --track:#0c0e0f;
    --panel:#15181a;
    --panel-2:#1c2022;
    --line: rgba(238,241,240,0.08);
    --text:#eef1f0;
    --muted:#7c8a86;
    --go:#3ddc84;
    --go-dim: rgba(61,220,132,0.12);
    --stop:#ff4a3d;
    --stop-dim: rgba(255,74,61,0.12);
    --purple:#b06bff;
    --purple-dim: rgba(176,107,255,0.12);
    --amber:#ffb300;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, rgba(61,220,132,0.05), transparent 45%),
      radial-gradient(circle at 85% 100%, rgba(176,107,255,0.05), transparent 45%),
      var(--track);
    color:var(--text);
    font-family:'Rajdhani', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }

  .rig{
    width:100%;
    max-width:560px;
  }

  .rig-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:22px;
    padding:0 4px;
  }
  .rig-head .brand{
    font-weight:700;
    font-size:1.05rem;
    letter-spacing:0.14em;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .rig-head .brand .dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--muted);
    transition: background 200ms ease, box-shadow 200ms ease;
  }
  .rig-head .brand .dot.live{
    background:var(--go);
    box-shadow:0 0 0 4px var(--go-dim);
    animation: blink 1.1s ease-in-out infinite;
  }
  @keyframes blink{ 50%{ opacity:0.45; } }
  .rig-head .sub{
    font-size:0.72rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--muted);
  }

  .panel{
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line);
    border-radius:20px;
    padding:clamp(28px,6vw,44px) clamp(20px,6vw,40px) 30px;
    box-shadow: 0 30px 60px -30px rgba(0,0,0,0.7);
  }

  .display-wrap{
    text-align:center;
    padding-bottom:26px;
    border-bottom:1px solid var(--line);
    margin-bottom:26px;
  }

  .status-tag{
    display:inline-block;
    font-size:0.68rem;
    letter-spacing:0.2em;
    text-transform:uppercase;
    font-weight:600;
    color:var(--muted);
    background:rgba(238,241,240,0.05);
    border:1px solid var(--line);
    padding:4px 12px;
    border-radius:100px;
    margin-bottom:18px;
    transition: color 200ms ease, border-color 200ms ease, background 200ms ease;
  }
  .status-tag.running{ color:var(--go); border-color:rgba(61,220,132,0.35); background:var(--go-dim); }
  .status-tag.paused{ color:var(--amber); border-color:rgba(255,179,0,0.35); background:rgba(255,179,0,0.1); }

  #display{
    font-family:'JetBrains Mono', monospace;
    font-variant-numeric: tabular-nums;
    font-weight:700;
    font-size:clamp(3rem, 12vw, 4.6rem);
    letter-spacing:0.01em;
    line-height:1;
  }
  #display .cs{
    font-size:0.5em;
    color:var(--muted);
  }

  .current-lap-hint{
    margin-top:10px;
    font-size:0.76rem;
    color:var(--muted);
    letter-spacing:0.08em;
    text-transform:uppercase;
    min-height:1em;
  }

  .controls{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  button{
    font-family:'Rajdhani', sans-serif;
    font-weight:700;
    font-size:0.98rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:16px 10px;
    border-radius:12px;
    border:1px solid var(--line);
    background:rgba(238,241,240,0.04);
    color:var(--text);
    cursor:pointer;
    transition: background 180ms ease, border-color 180ms ease, transform 120ms ease, color 180ms ease, opacity 180ms ease;
  }
  button:active{ transform:scale(0.97); }
  button:disabled{ opacity:0.35; cursor:not-allowed; }
  button:disabled:active{ transform:none; }

  #startBtn.state-start{ background:var(--go-dim); border-color:rgba(61,220,132,0.4); color:var(--go); }
  #startBtn.state-start:hover:not(:disabled){ background:rgba(61,220,132,0.2); }
  #startBtn.state-pause{ background:var(--stop-dim); border-color:rgba(255,74,61,0.4); color:var(--stop); }
  #startBtn.state-pause:hover:not(:disabled){ background:rgba(255,74,61,0.2); }

  #sideBtn.state-reset{ color:var(--amber); border-color:rgba(255,179,0,0.35); }
  #sideBtn.state-reset:hover:not(:disabled){ background:rgba(255,179,0,0.1); }
  #sideBtn:hover:not(:disabled):not(.state-reset){ background:rgba(238,241,240,0.08); }

  .stats-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:22px;
  }
  .stat-box{
    text-align:center;
    padding:12px 6px;
    border:1px solid var(--line);
    border-radius:10px;
    background:rgba(238,241,240,0.02);
  }
  .stat-box .label{
    font-size:0.64rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .stat-box .value{
    margin-top:6px;
    font-family:'JetBrains Mono', monospace;
    font-variant-numeric: tabular-nums;
    font-weight:700;
    font-size:0.95rem;
  }
  .stat-box.best .value{ color:var(--purple); }
  .stat-box.worst .value{ color:var(--stop); }

  .lap-sheet{ margin-top:26px; }
  .lap-sheet-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 6px 10px;
  }
  .lap-sheet-head .cols{
    display:grid;
    grid-template-columns:44px 1fr 1fr;
    flex:1;
    font-size:0.68rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .export-btn{
    font-family:'Rajdhani', sans-serif;
    font-size:0.68rem;
    font-weight:700;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--muted);
    background:transparent;
    border:1px solid var(--line);
    border-radius:100px;
    padding:5px 12px;
    cursor:pointer;
    transition: color 180ms ease, border-color 180ms ease, background 180ms ease;
  }
  .export-btn:hover:not(:disabled){ color:var(--text); border-color:var(--muted); background:rgba(238,241,240,0.06); }
  .export-btn:disabled{ opacity:0.3; cursor:not-allowed; }

  .shortcuts-hint{
    display:flex;
    justify-content:center;
    gap:16px;
    flex-wrap:wrap;
    margin-top:22px;
    padding-top:16px;
    border-top:1px solid var(--line);
    font-size:0.68rem;
    letter-spacing:0.04em;
    color:var(--muted);
  }
  .shortcuts-hint kbd{
    font-family:'JetBrains Mono', monospace;
    background:rgba(238,241,240,0.06);
    border:1px solid var(--line);
    border-radius:5px;
    padding:1px 6px;
    font-size:0.7rem;
    color:var(--text);
  }
  .lap-list{
    max-height:230px;
    overflow-y:auto;
    display:flex;
    flex-direction:column-reverse;
    gap:2px;
  }
  .lap-list::-webkit-scrollbar{ width:6px; }
  .lap-list::-webkit-scrollbar-thumb{ background:var(--line); border-radius:10px; }

  .lap-row{
    display:grid;
    grid-template-columns:44px 1fr 1fr;
    align-items:center;
    padding:10px 6px;
    border-radius:8px;
    font-family:'JetBrains Mono', monospace;
    font-variant-numeric: tabular-nums;
    font-size:0.92rem;
    background:rgba(238,241,240,0.02);
  }
  .lap-row .lap-num{ font-family:'Rajdhani',sans-serif; font-weight:600; color:var(--muted); }
  .lap-row .lap-delta{ font-size:0.8rem; text-align:right; }
  .lap-row.best{ background:var(--purple-dim); }
  .lap-row.best .lap-num, .lap-row.best .lap-time{ color:var(--purple); }
  .lap-row.worst .lap-delta{ color:var(--stop); }
  .lap-row:not(.best) .lap-delta.faster{ color:var(--go); }
  .lap-row:not(.best) .lap-delta.slower{ color:var(--stop); }

  .empty-note{
    text-align:center;
    color:var(--muted);
    font-size:0.82rem;
    padding:18px 0 4px;
    letter-spacing:0.03em;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition-duration:1ms !important; }
  }
</style>
</head>
<body>

<div class="rig">
  <div class="rig-head">
    <div class="brand"><span class="dot" id="liveDot"></span>APEX // SPLIT TIMER</div>
    <div class="sub">Precision to 1/100s</div>
  </div>

  <div class="panel">
    <div class="display-wrap">
      <span class="status-tag" id="statusTag">Ready</span>
      <div id="display">00:00<span class="cs">.00</span></div>
      <div class="current-lap-hint" id="lapHint"></div>
    </div>

    <div class="controls">
      <button id="sideBtn" class="state-lap" disabled>Lap</button>
      <button id="startBtn" class="state-start">Start</button>
    </div>

    <div class="stats-row">
      <div class="stat-box best">
        <div class="label">Best Lap</div>
        <div class="value" id="statBest">—</div>
      </div>
      <div class="stat-box">
        <div class="label">Average</div>
        <div class="value" id="statAvg">—</div>
      </div>
      <div class="stat-box worst">
        <div class="label">Worst Lap</div>
        <div class="value" id="statWorst">—</div>
      </div>
    </div>

    <div class="lap-sheet">
      <div class="lap-sheet-head">
        <div class="cols"><span>Lap</span><span>Time</span><span style="text-align:right;">Delta</span></div>
        <button class="export-btn" id="exportBtn" disabled>Export CSV</button>
      </div>
      <div class="lap-list" id="lapList"></div>
      <div class="empty-note" id="emptyNote">No laps recorded yet</div>
    </div>

    <div class="shortcuts-hint">
      <span><kbd>Space</kbd> Start / Pause</span>
      <span><kbd>L</kbd> Lap</span>
      <span><kbd>R</kbd> Reset</span>
    </div>
  </div>
</div>

<script>
  const display = document.getElementById('display');
  const startBtn = document.getElementById('startBtn');
  const sideBtn = document.getElementById('sideBtn');
  const statusTag = document.getElementById('statusTag');
  const liveDot = document.getElementById('liveDot');
  const lapList = document.getElementById('lapList');
  const emptyNote = document.getElementById('emptyNote');
  const lapHint = document.getElementById('lapHint');
  const statBest = document.getElementById('statBest');
  const statAvg = document.getElementById('statAvg');
  const statWorst = document.getElementById('statWorst');
  const exportBtn = document.getElementById('exportBtn');

  let running = false;
  let startTime = 0;       // performance.now() at (re)start
  let elapsed = 0;         // accumulated ms while paused
  let rafId = null;
  let laps = [];           // { totalMs, lapMs }
  let lastLapTotal = 0;

  function formatTime(ms){
    const totalCs = Math.floor(ms / 10);
    const cs = totalCs % 100;
    const totalSec = Math.floor(totalCs / 100);
    const s = totalSec % 60;
    const m = Math.floor(totalSec / 60);
    const pad = (n, len=2) => String(n).padStart(len, '0');
    return { main: `${pad(m)}:${pad(s)}`, cs: pad(cs) };
  }

  function render(ms){
    const { main, cs } = formatTime(ms);
    display.innerHTML = `${main}<span class="cs">.${cs}</span>`;
  }

  function tick(){
    const now = performance.now();
    const currentElapsed = elapsed + (now - startTime);
    render(currentElapsed);
    rafId = requestAnimationFrame(tick);
  }

  function updateButtons(){
    if (running){
      startBtn.textContent = 'Pause';
      startBtn.className = 'state-pause';
      sideBtn.textContent = 'Lap';
      sideBtn.className = 'state-lap';
      sideBtn.disabled = false;
      statusTag.textContent = 'Running';
      statusTag.className = 'status-tag running';
      liveDot.classList.add('live');
    } else {
      startBtn.textContent = elapsed > 0 ? 'Resume' : 'Start';
      startBtn.className = 'state-start';
      sideBtn.textContent = 'Reset';
      sideBtn.className = 'state-reset';
      sideBtn.disabled = elapsed === 0;
      statusTag.textContent = elapsed > 0 ? 'Paused' : 'Ready';
      statusTag.className = elapsed > 0 ? 'status-tag paused' : 'status-tag';
      liveDot.classList.remove('live');
    }
  }

  function start(){
    running = true;
    startTime = performance.now();
    rafId = requestAnimationFrame(tick);
    updateButtons();
  }

  function pause(){
    running = false;
    elapsed += performance.now() - startTime;
    cancelAnimationFrame(rafId);
    render(elapsed);
    updateButtons();
  }

  function reset(){
    running = false;
    elapsed = 0;
    lastLapTotal = 0;
    laps = [];
    cancelAnimationFrame(rafId);
    render(0);
    lapList.innerHTML = '';
    emptyNote.style.display = 'block';
    lapHint.textContent = '';
    statBest.textContent = '—';
    statAvg.textContent = '—';
    statWorst.textContent = '—';
    exportBtn.disabled = true;
    updateButtons();
  }

  function recordLap(){
    const now = performance.now();
    const currentTotal = elapsed + (running ? now - startTime : 0);
    const lapMs = currentTotal - lastLapTotal;
    lastLapTotal = currentTotal;
    laps.push({ totalMs: currentTotal, lapMs });
    renderLaps();
  }

  function renderLaps(){
    if (laps.length === 0){
      lapList.innerHTML = '';
      emptyNote.style.display = 'block';
      lapHint.textContent = '';
      return;
    }
    emptyNote.style.display = 'none';
    exportBtn.disabled = false;

    const lapTimes = laps.map(l => l.lapMs);
    const best = Math.min(...lapTimes);
    const worst = laps.length > 1 ? Math.max(...lapTimes) : null;
    const avgMs = lapTimes.reduce((a, b) => a + b, 0) / lapTimes.length;

    const bestFmt = formatTime(best);
    const avgFmt = formatTime(avgMs);
    statBest.textContent = `${bestFmt.main}.${bestFmt.cs}`;
    statAvg.textContent = `${avgFmt.main}.${avgFmt.cs}`;
    statWorst.textContent = worst !== null ? (() => { const w = formatTime(worst); return `${w.main}.${w.cs}`; })() : '—';

    lapList.innerHTML = laps.map((lap, i) => {
      const num = i + 1;
      const { main, cs } = formatTime(lap.lapMs);
      let cls = 'lap-row';
      let deltaText = '—';
      let deltaCls = '';

      if (laps.length > 1){
        if (lap.lapMs === best) cls += ' best';
        if (worst !== null && lap.lapMs === worst && worst !== best) cls += ' worst';

        if (i > 0){
          const diff = lap.lapMs - laps[i-1].lapMs;
          const sign = diff <= 0 ? '−' : '+';
          const { main: dm, cs: dcs } = formatTime(Math.abs(diff));
          deltaText = `${sign}${dm}.${dcs}`;
          deltaCls = diff <= 0 ? 'faster' : 'slower';
        }
      }

      return `
        <div class="${cls}">
          <span class="lap-num">${String(num).padStart(2,'0')}</span>
          <span class="lap-time">${main}.${cs}</span>
          <span class="lap-delta ${deltaCls}">${deltaText}</span>
        </div>`;
    }).join('');

    lapHint.textContent = laps.length ? `${laps.length} lap${laps.length > 1 ? 's' : ''} recorded` : '';
  }

  function exportCSV(){
    if (laps.length === 0) return;
    const rows = [['Lap', 'Lap Time', 'Total Time']];
    laps.forEach((lap, i) => {
      const lapFmt = formatTime(lap.lapMs);
      const totalFmt = formatTime(lap.totalMs);
      rows.push([i + 1, `${lapFmt.main}.${lapFmt.cs}`, `${totalFmt.main}.${totalFmt.cs}`]);
    });
    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `apex-laps-${Date.now()}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  startBtn.addEventListener('click', () => {
    running ? pause() : start();
  });

  sideBtn.addEventListener('click', () => {
    if (running){
      recordLap();
    } else if (elapsed > 0){
      reset();
    }
  });

  exportBtn.addEventListener('click', exportCSV);

  document.addEventListener('keydown', (e) => {
    if (e.repeat) return;
    const key = e.key.toLowerCase();

    if (key === ' '){
      e.preventDefault();
      running ? pause() : start();
    } else if (key === 'l'){
      e.preventDefault();
      if (running) recordLap();
    } else if (key === 'r'){
      e.preventDefault();
      if (!running && elapsed > 0) reset();
    }
  });

  render(0);
  updateButtons();
</script>

</body>
</html>
